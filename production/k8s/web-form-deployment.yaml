apiVersion: apps/v1
kind: Deployment
metadata:
  name: web-form
  namespace: customer-success-agent
  labels:
    app: web-form
spec:
  replicas: 2
  selector:
    matchLabels:
      app: web-form
  template:
    metadata:
      labels:
        app: web-form
    spec:
      containers:
        - name: web-form
          image: customer-success-web-form:latest
          ports:
            - containerPort: 80
          env:
            - name: REACT_APP_API_BASE_URL
              value: "http://backend:8000"
            - name: REACT_APP_ENVIRONMENT
              value: "production"
          livenessProbe:
            httpGet:
              path: /
              port: 80
            initialDelaySeconds: 10
            periodSeconds: 10
          readinessProbe:
            httpGet:
              path: /
              port: 80
            initialDelaySeconds: 5
            periodSeconds: 5
          resources:
            requests:
              memory: "128Mi"
              cpu: "100m"
            limits:
              memory: "256Mi"
              cpu: "200m"
---
apiVersion: v1
kind: Service
metadata:
  name: web-form
  namespace: customer-success-agent
spec:
  selector:
    app: web-form
  ports:
    - protocol: TCP
      port: 80
      targetPort: 80
  type: ClusterIP