apiVersion: v1
kind: ConfigMap
metadata:
  name: customer-success-config
  namespace: customer-success-fte
data:
  # Database configuration
  DB_HOST: "postgres.customer-success-fte.svc.cluster.local"
  DB_PORT: "5432"
  DB_NAME: "customer_success"
  DB_SSL_MODE: "require"

  # Kafka configuration
  KAFKA_BOOTSTRAP_SERVERS: "kafka.customer-success-fte.svc.cluster.local:9092"

  # API configuration
  HOST: "0.0.0.0"
  PORT: "8000"

  # Mistral AI configuration
  MISTRAL_API_BASE_URL: "https://api.mistral.ai/v1"
  MISTRAL_MODEL: "mistral-large-latest"

  # Application settings
  LOG_LEVEL: "INFO"
  MAX_WORKERS: "4"
  DATABASE_POOL_SIZE: "20"
  DATABASE_POOL_TIMEOUT: "30"
  DATABASE_POOL_RECYCLE: "3600"

  # Health check settings
  HEALTH_CHECK_INTERVAL: "30s"
  READINESS_TIMEOUT: "10"
  LIVENESS_TIMEOUT: "10"
