apiVersion: v1
kind: Secret
metadata:
  name: customer-success-secrets
  namespace: customer-success-fte
type: Opaque
data:
  # Database credentials
  DB_USER: cG9zdGdyZXM=  # postgres (base64 encoded)
  DB_PASSWORD: cGFzc3dvcmQ=  # password (base64 encoded)

  # AI API key
  MISTRAL_API_KEY: <MISTRAL_API_KEY_BASE64_ENCODED>  # Replace with actual base64 encoded key

  # WhatsApp credentials
  WHATSAPP_TOKEN: <WHATSAPP_TOKEN_BASE64_ENCODED>  # Replace with actual base64 encoded token
  WHATSAPP_PHONE_NUMBER_ID: <WHATSAPP_PHONE_NUMBER_ID_BASE64_ENCODED>  # Replace with actual base64 encoded ID
  TWILIO_ACCOUNT_SID: <TWILIO_ACCOUNT_SID_BASE64_ENCODED>  # Replace with actual base64 encoded SID
  TWILIO_AUTH_TOKEN: <TWILIO_AUTH_TOKEN_BASE64_ENCODED>  # Replace with actual base64 encoded token

  # Email credentials (for production)
  GMAIL_CLIENT_ID: <GMAIL_CLIENT_ID_BASE64_ENCODED>  # Replace with actual base64 encoded ID
  GMAIL_CLIENT_SECRET: <GMAIL_CLIENT_SECRET_BASE64_ENCODED>  # Replace with actual base64 encoded secret
  GMAIL_REFRESH_TOKEN: <GMAIL_REFRESH_TOKEN_BASE64_ENCODED>  # Replace with actual base64 encoded token

  # Security
  JWT_SECRET: <JWT_SECRET_BASE64_ENCODED>  # Replace with actual base64 encoded secret
  ENCRYPTION_KEY: <ENCRYPTION_KEY_BASE64_ENCODED>  # Replace with actual base64 encoded key

  # Webhook verification
  META_WHATSAPP_VERIFY_TOKEN: <META_WHATSAPP_VERIFY_TOKEN_BASE64_ENCODED>  # Replace with actual base64 encoded token
