apiVersion: apps/v1
kind: Deployment
metadata:
  name: backend
  namespace: customer-success-agent
  labels:
    app: backend
spec:
  replicas: 2
  selector:
    matchLabels:
      app: backend
  template:
    metadata:
      labels:
        app: backend
    spec:
      containers:
        - name: backend
          image: customer-success-backend:latest
          ports:
            - containerPort: 8000
          env:
            - name: DATABASE_URL
              value: "postgresql+asyncpg://postgres:password@postgres:5432/customer_success_db"
            - name: KAFKA_BOOTSTRAP_SERVERS
              value: "kafka:9092"
            - name: OPENAI_API_KEY
              valueFrom:
                secretKeyRef:
                  name: customer-success-secrets
                  key: openai-api-key
            - name: GMAIL_CLIENT_ID
              valueFrom:
                secretKeyRef:
                  name: customer-success-secrets
                  key: gmail-client-id
            - name: GMAIL_CLIENT_SECRET
              valueFrom:
                secretKeyRef:
                  name: customer-success-secrets
                  key: gmail-client-secret
            - name: GMAIL_REFRESH_TOKEN
              valueFrom:
                secretKeyRef:
                  name: customer-success-secrets
                  key: gmail-refresh-token
            - name: TWILIO_ACCOUNT_SID
              valueFrom:
                secretKeyRef:
                  name: customer-success-secrets
                  key: twilio-account-sid
            - name: TWILIO_AUTH_TOKEN
              valueFrom:
                secretKeyRef:
                  name: customer-success-secrets
                  key: twilio-auth-token
            - name: TWILIO_WHATSAPP_NUMBER
              valueFrom:
                secretKeyRef:
                  name: customer-success-secrets
                  key: twilio-whatsapp-number
            - name: SECRET_KEY
              valueFrom:
                secretKeyRef:
                  name: customer-success-secrets
                  key: secret-key
            - name: DEBUG
              value: "False"
            - name: LOG_LEVEL
              value: "INFO"
          livenessProbe:
            httpGet:
              path: /health
              port: 8000
            initialDelaySeconds: 30
            periodSeconds: 10
          readinessProbe:
            httpGet:
              path: /health
              port: 8000
            initialDelaySeconds: 5
            periodSeconds: 5
          resources:
            requests:
              memory: "256Mi"
              cpu: "250m"
            limits:
              memory: "512Mi"
              cpu: "500m"
---
apiVersion: v1
kind: Service
metadata:
  name: backend
  namespace: customer-success-agent
spec:
  selector:
    app: backend
  ports:
    - protocol: TCP
      port: 8000
      targetPort: 8000
  type: ClusterIP